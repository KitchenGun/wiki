text only</tspan></text><text x="1100" y="523" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="1100" dy="0">Highest: image</tspan><tspan x="1100" dy="25">vision tokens</tspan></text><rect x="96" y="558" width="1408" height="62" fill="#FFFFFF"/><text x="118" y="589" text-anchor="start" fill="#0F172A" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="118" dy="0">Speed</tspan></text><text x="280" y="585" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="280" dy="0">Repeated latency</tspan></text><rect x="674" y="563" width="335" height="55" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="585" text-anchor="start" fill="#064E3B" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="690" dy="0">Fast: fixed turns</tspan></text><text x="1100" y="585" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="1100" dy="0">Slow: render +</tspan><tspan x="1100" dy="25">encode wait</tspan></text><rect x="96" y="620" width="1408" height="62" fill="#F8FAFC"/><text x="118" y="651" text-anchor="start" fill="#0F172A" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="118" dy="0">Accuracy</tspan></text><text x="280" y="647" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="280" dy="0">Only if the name is</tspan><tspan x="280" dy="25">right</tspan></text><rect x="674" y="625" width="335" height="55" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="647" text-anchor="start" fill="#064E3B" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="690" dy="0">Actual previous vs</tspan><tspan x="690" dy="25">current diff</tspan></text><text x="1100" y="647" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="1100" dy="0">Most comprehensive</tspan></text><rect x="96" y="682" width="1408" height="62" fill="#FFFFFF"/><text x="118" y="713" text-anchor="start" fill="#0F172A" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="118" dy="0">Blind</tspan><tspan x="118" dy="25">spot</tspan></text><text x="280" y="709" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="280" dy="0">Unknown properties</tspan><tspan x="280" dy="25">are missed</tspan></text><rect x="674" y="687" width="335" height="55" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="709" text-anchor="start" fill="#064E3B" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="690" dy="0">Event graph logic</tspan><tspan x="690" dy="25">excluded</tspan></text><text x="1100" y="709" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="1100" dy="0">Same as what a human</tspan><tspan x="1100" dy="25">sees</tspan></text><rect x="96" y="744" width="1408" height="62" fill="#F8FAFC"/><text x="118" y="775" text-anchor="start" fill="#0F172A" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="118" dy="0">Side</tspan><tspan x="118" dy="25">effect</tspan></text><text x="280" y="771" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="280" dy="0">No special cleanup</tspan></text><rect x="674" y="749" width="335" height="55" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="771" text-anchor="start" fill="#064E3B" font-size="21" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="690" dy="0">Temp cleanup</tspan><tspan x="690" dy="25">required</tspan></text><text x="1100" y="771" text-anchor="start" fill="#334155" font-size="20" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif"><tspan x="1100" dy="0">Close the diff</tspan><tspan x="1100" dy="25">window</tspan></text>
