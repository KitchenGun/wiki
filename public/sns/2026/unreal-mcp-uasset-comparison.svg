  <text x="120" y="286" fill="#475569" font-size="23" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif">스크린샷 판독 없이 텍스트 로그로 확인 · 처음 27개처럼 보이던 차이 후보를 실제 의미 있는 변경 3개로 축소</text>

