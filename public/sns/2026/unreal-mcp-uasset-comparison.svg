  <text x="360" y="246" fill="#B91C1C" font-size="36" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif">5~6회</text>
  <text x="475" y="246" fill="#64748B" font-size="28" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif">→</text>
