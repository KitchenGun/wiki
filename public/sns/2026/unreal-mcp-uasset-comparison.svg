<rect x="96" y="444" width="1408" height="66" fill="#FFFFFF"/><text x="118" y="476" text-anchor="start" fill="#0F172A" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="118" dy="0">MCP 왕복</tspan></text><text x="280" y="470" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="280" dy="0">5~6회, 실패시 반복</tspan></text><rect x="674" y="449" width="335" height="58" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="470" text-anchor="start" fill="#064E3B" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="690" dy="0">2회 고정: 실행 1 +</tspan><tspan x="690" dy="28">로그조회 1</tspan></text><text x="1100" y="470" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="1100" dy="0">2~3회 + UI 대기</tspan></text><rect x="96" y="510" width="1408" height="66" fill="#F8FAFC"/><text x="118" y="542" text-anchor="start" fill="#0F172A" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="118" dy="0">토큰 비용</tspan></text><text x="280" y="536" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="280" dy="0">텍스트지만 왕복 누적</tspan></text><rect x="674" y="515" width="335" height="58" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="536" text-anchor="start" fill="#064E3B" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="690" dy="0">가장 낮음: 텍스트만 사용</tspan></text><text x="1100" y="536" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="1100" dy="0">가장 높음: 이미지 비전</tspan><tspan x="1100" dy="28">토큰</tspan></text><rect x="96" y="576" width="1408" height=