  <text x="80" y="118" fill="#CBD5E1" font-size="25" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif">DualFire · Unreal MCP 에셋 탐색 효율 비교 · 현재 선택: B안</text>

  <rect x="80" y="196" width="1440" height="112" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
