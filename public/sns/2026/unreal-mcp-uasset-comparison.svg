ight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="118" dy="0">사각지대</tspan></text><text x="280" y="734" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="280" dy="0">모르는 속성은 누락</tspan></text><rect x="674" y="713" width="335" height="58" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="734" text-anchor="start" fill="#064E3B" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="690" dy="0">이벤트그래프 로직 제외</tspan></text><text x="1100" y="734" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="1100" dy="0">사람이 보는 범위와 동일</tspan></text><rect x="96" y="774" width="1408" height="66" fill="#F8FAFC"/><text x="118" y="806" text-anchor="start" fill="#0F172A" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="118" dy="0">부작용</tspan></text><text x="280" y="800" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="280" dy="0">별도 관리 없음</tspan></text><rect x="674" y="779" width="335" height="58" rx="10" fill="#D1FAE5" opacity="0.62"/><text x="690" y="800" text-anchor="start" fill="#064E3B" font-size="22" font-weight="800" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="690" dy="0">임시 패키지 언로드/삭제</tspan><tspan x="690" dy="28">필요</tspan></text><text x="1100" y="800" text-anchor="start" fill="#334155" font-size="21" font-weight="600" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif"><tspan x="1100" dy="0">창만 닫으면 됨</tspan></text>
  <rect x="80" y="842" width="1440" height="2" fill="#E5E7EB"/>
  <text x="80" y="878" fill="#475569" font-size="22" font-family="Malgun Gothic, Noto Sans KR, Arial, sans-serif">결론: B안은 AI 검토용 신호를 가장 싸고 빠르게 텍스트로 만든다. 단, Blueprint 이벤트그래프 로직 변경은 에디터 diff로 보강 확인한다.</text>
