    commands:
    - /weekly-profile allowlist list
    - /weekly-profile allowlist add <discord_user_id>
    - /weekly-profile allowlist remove <discord_user_id>
  github_sources:
    commands:
    - /weekly-profile github username <name>
    - /weekly-profile github repos <owner/repo,owner/repo>
